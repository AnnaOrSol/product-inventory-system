spring.application.name=gateway-service
server.port=8087

spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://product-service:8084
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/product/**

spring.cloud.gateway.server.webmvc.routes[1].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://inventory-service:8085
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.server.webmvc.routes[2].id=installation-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://inventory-service:8085
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/installations/**

spring.cloud.gateway.server.webmvc.routes[3].id=inventory-health
spring.cloud.gateway.server.webmvc.routes[3].uri=http://inventory-service:8085
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/inventory-health
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=SetPath=/health

spring.cloud.gateway.server.webmvc.routes[4].id=product-health
spring.cloud.gateway.server.webmvc.routes[4].uri=http://product-service:8084
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/product-health
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=SetPath=/health

spring.cloud.gateway.server.webmvc.routes[5].id=auth-service
spring.cloud.gateway.server.webmvc.routes[5].uri=http://auth-service:8086
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/auth/**


app.jwt.secret=myVerySecretJwtKeyThatIsLongEnough12345678901234567890
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG